<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header>
        <nav>

        </nav>
    </header>

    <main>

        <div class="container text-primary-emphasis bg-primary-subtle border border-primary-subtle rounded-3" style="width: 100%; max-width: 400px;">
            <h2 id="titulo" class="text-center">Login</h2>

            <form id="form-login">

                <div id="c-email" classe="conjunto">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Email" required>
                </div><br>

                <div id="c-senha" classe="conjunto">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" placeholder="Senha" required>
                </div><br>

                <button id="botao-envio" type="submit" class="btn btn-light text-center">Entrar</button>

            </form>

            <div id="mensagem"></div>
            <div class="toggle" id="toggle">
            <p>Não tem conta? Cadastre-se!</p>
            </div>

        </div>
    </main>
<script src="script/script.js"></script>
</body>
</html>
